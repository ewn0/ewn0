  <line x1="900" y1="0" x2="900" y2="300" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="1050" y1="0" x2="1050" y2="300" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  
