  <line x1="0" y1="150" x2="1200" y2="150" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="250" x2="1200" y2="250" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="0" x2="150" y2="300" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="0" x2="450" y2="300" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1a2847" stroke-width="1" opacity="0.3"/>
