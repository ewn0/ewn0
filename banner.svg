  <line x1="50" y1="120" x2="200" y2="120" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
  <line x1="950" y1="180" x2="1150" y2="180" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
  
  <!-- Main title -->
  <text x="60" y="110" font-family="Courier New, monospace" font-size="56" font-weight="bold" fill="#ffffff" letter-spacing="2">ewn0</text>
  
  <!-- Subtitle -->
  <text x="60" y="160" font-family="Courier New, monospace" font-size="18" fill="#00ff88" letter-spacing="1">cybersecurity | automation</text>
  
